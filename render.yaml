services:
  - type: web
    name: dragonsvitex-tts-studio
    runtime: python
    buildCommand: pip install -r api/requirements.txt
    startCommand: uvicorn api.index:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: OUTPUT_DIR
        value: ./output
      - key: TEMP_DIR
        value: ./temp
