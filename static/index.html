<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragonsvitex TTS Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%); }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); }
        .emotion-btn { min-width: 80px; }
        
        /* Waveform animation */
        .waveform { display: flex; align-items: center; justify-content: center; gap: 2px; height: 32px; }
        .waveform span {
            width: 3px;
            background: linear-gradient(to top, #3b82f6, #8b5cf6);
            border-radius: 2px;
            animation: wave 1s ease-in-out infinite;
        }
        .waveform span:nth-child(1) { animation-delay: 0s; }
        .waveform span:nth-child(2) { animation-delay: 0.1s; }
        .waveform span:nth-child(3) { animation-delay: 0.2s; }
        .waveform span:nth-child(4) { animation-delay: 0.3s; }
        .waveform span:nth-child(5) { animation-delay: 0.4s; }
        .waveform span:nth-child(6) { animation-delay: 0.5s; }
        .waveform span:nth-child(7) { animation-delay: 0.6s; }
        
        @keyframes wave {
            0%, 100% { height: 8px; }
            50% { height: 28px; }
        }
        
        .waveform.paused span {
            animation: none;
            height: 12px;
        }
        
        /* Progress bar */
        .progress-bar {
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            height: 6px;
            overflow: hidden;
            cursor: pointer;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            border-radius: 4px;
            transition: width 0.1s linear;
        }
        
        /* Player card */
        .player-card {
            background: linear-gradient(135deg, rgba(59,130,246,0.1), rgba(139,92,246,0.1));
            border: 1px solid rgba(139,92,246,0.3);
        }
        .player-card.playing {
            border-color: rgba(139,92,246,0.6);
            box-shadow: 0 0 30px rgba(139,92,246,0.2);
        }
        
        /* Scroll styling */
        .history-scroll::-webkit-scrollbar { width: 4px; }
        .history-scroll::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 2px; }
        .history-scroll::-webkit-scrollbar-thumb { background: rgba(139,92,246,0.5); border-radius: 2px; }
    </style>
</head>
<body class="min-h-screen text-white p-4 md:p-8">
    <div id="app"></div>

    <script>
    const API_URL = window.location.origin;

    const voices = [
        { id: 'dmitry', name: 'Дмитрий', description: 'Профессиональный мужской', gender: 'male' },
        { id: 'dmitry_advanced', name: 'Дмитрий Pro', description: 'С эмоциями', gender: 'male' },
        { id: 'oleg', name: 'Олег', description: 'С характером', gender: 'male' },
        { id: 'filipp', name: 'Филипп', description: 'Мужской голос', gender: 'male' },
        { id: 'svetlana', name: 'Светлана', description: 'Профессиональный женский', gender: 'female' },
        { id: 'svetlana_advanced', name: 'Светлана Pro', description: 'С эмоциями', gender: 'female' },
        { id: 'alena', name: 'Алёна', description: 'Мягкий женский', gender: 'female' },
    ];

    const emotions = [
        { id: 'neutral', emoji: '😐', name: 'Нейтральный' },
        { id: 'cheerful', emoji: '😊', name: 'Весёлый' },
        { id: 'sad', emoji: '😢', name: 'Грустный' },
        { id: 'angry', emoji: '😠', name: 'Злой' },
        { id: 'scared', emoji: '😨', name: 'Испуг' },
        { id: 'serious', emoji: '🧐', name: 'Серьёзный' },
        { id: 'gentle', emoji: '🥰', name: 'Нежный' },
        { id: 'calm', emoji: '😌', name: 'Спокойный' },
        { id: 'professional', emoji: '💼', name: 'Деловой' },
    ];

    let state = {
        selectedVoice: 'dmitry_advanced',
        selectedEmotion: 'neutral',
        text: '',
        speed: 0,
        isGenerating: false,
        history: [],
        currentAudio: null,
        isPlaying: false,
        playingId: null,
        progress: 0,
        genderFilter: 'all'
    };

    let progressInterval = null;

    async function generateTTS() {
        const text = state.text.trim();
        if (!text) {
            alert('Введите текст для генерации');
            return;
        }

        state.isGenerating = true;
        render();

        try {
            const response = await fetch(`${API_URL}/generate`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json; charset=utf-8' },
                body: JSON.stringify({
                    text: text,
                    voice: state.selectedVoice,
                    emotion: state.selectedEmotion,
                    speed: state.speed
                })
            });

            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.detail || 'Ошибка генерации');
            }

            const result = await response.json();
            state.history.unshift(result);
            state.text = '';
            render();
        } catch (error) {
            alert('Ошибка: ' + error.message);
        } finally {
            state.isGenerating = false;
            render();
        }
    }

    function playAudio(item) {
        if (state.currentAudio && state.playingId === item.id) {
            togglePlayPause();
            return;
        }

        if (state.currentAudio) {
            state.currentAudio.pause();
            clearInterval(progressInterval);
        }

        const audio = new Audio(`${API_URL}${item.audio_url}`);
        
        audio.onloadedmetadata = () => {
            state.currentAudio = audio;
            state.isPlaying = true;
            state.playingId = item.id;
            state.progress = 0;
            render();
            startProgressTracking();
        };

        audio.onended = () => {
            state.isPlaying = false;
            state.playingId = null;
            state.progress = 0;
            clearInterval(progressInterval);
            render();
        };

        audio.onerror = () => {
            alert('Ошибка воспроизведения');
            state.isPlaying = false;
            state.playingId = null;
            clearInterval(progressInterval);
            render();
        };

        audio.play();
        state.currentAudio = audio;
        state.isPlaying = true;
        state.playingId = item.id;
        render();
    }

    function startProgressTracking() {
        clearInterval(progressInterval);
        progressInterval = setInterval(() => {
            if (state.currentAudio && state.isPlaying) {
                const progress = (state.currentAudio.currentTime / state.currentAudio.duration) * 100;
                state.progress = progress || 0;
                
                const progressEl = document.getElementById('progress-fill-' + state.playingId);
                if (progressEl) {
                    progressEl.style.width = progress + '%';
                }
                
                const timeEl = document.getElementById('time-' + state.playingId);
                if (timeEl) {
                    const current = formatTime(state.currentAudio.currentTime);
                    const total = formatTime(state.currentAudio.duration);
                    timeEl.textContent = `${current} / ${total}`;
                }
            }
        }, 100);
    }

    function togglePlayPause() {
        if (!state.currentAudio) return;

        if (state.isPlaying) {
            state.currentAudio.pause();
            state.isPlaying = false;
            clearInterval(progressInterval);
        } else {
            state.currentAudio.play();
            state.isPlaying = true;
            startProgressTracking();
        }
        render();
    }

    function seekAudio(item, event) {
        if (!state.currentAudio || state.playingId !== item.id) return;
        
        const rect = event.currentTarget.getBoundingClientRect();
        const x = event.clientX - rect.left;
        const percent = x / rect.width;
        state.currentAudio.currentTime = percent * state.currentAudio.duration;
        state.progress = percent * 100;
        render();
    }

    function downloadAudio(item) {
        const link = document.createElement('a');
        link.href = `${API_URL}${item.audio_url}`;
        link.download = `tts_${item.id}.mp3`;
        link.click();
    }

    function formatTime(seconds) {
        if (!seconds || isNaN(seconds)) return '0:00';
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    function formatDuration(seconds) {
        return formatTime(seconds);
    }

    function render() {
        const filteredVoices = voices.filter(v =>
            state.genderFilter === 'all' || v.gender === state.genderFilter
        );

        const app = document.getElementById('app');
        app.innerHTML = `
        <div class="max-w-7xl mx-auto">
            <header class="text-center mb-8">
                <h1 class="text-4xl font-bold bg-gradient-to-r from-blue-400 via-purple-400 to-pink-400 bg-clip-text text-transparent mb-2">
                    Dragonsvitex TTS Studio
                </h1>
                <p class="text-gray-400">Профессиональная студия синтеза русской речи</p>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- Левая колонка: Голоса и Эмоции -->
                <div class="lg:col-span-2 space-y-6">
                    <!-- Выбор голоса -->
                    <div class="glass rounded-xl p-6 border border-white/10">
                        <div class="flex items-center justify-between mb-4">
                            <h2 class="text-xl font-semibold">Выбор голоса</h2>
                            <div class="flex gap-2">
                                <button onclick="state.genderFilter='all';render()"
                                    class="px-3 py-1 rounded-lg text-sm ${state.genderFilter === 'all' ? 'bg-blue-500' : 'bg-white/10 hover:bg-white/20'}">
                                    Все
                                </button>
                                <button onclick="state.genderFilter='male';render()"
                                    class="px-3 py-1 rounded-lg text-sm ${state.genderFilter === 'male' ? 'bg-blue-500' : 'bg-white/10 hover:bg-white/20'}">
                                    👨 Мужские
                                </button>
                                <button onclick="state.genderFilter='female';render()"
                                    class="px-3 py-1 rounded-lg text-sm ${state.genderFilter === 'female' ? 'bg-pink-500' : 'bg-white/10 hover:bg-white/20'}">
                                    👩 Женские
                                </button>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                            ${filteredVoices.map(v => `
                            <div onclick="state.selectedVoice='${v.id}';render()"
                                class="p-3 rounded-xl cursor-pointer transition-all ${state.selectedVoice === v.id ? 'bg-blue-500/20 border-2 border-blue-500' : 'bg-white/5 border border-white/10 hover:border-blue-400/50'}">
                                <div class="flex items-center gap-2">
                                    <div class="w-8 h-8 rounded-full ${v.gender === 'male' ? 'bg-gradient-to-br from-blue-500 to-purple-600' : 'bg-gradient-to-br from-pink-500 to-rose-600'} flex items-center justify-center text-sm">
                                        🎤
                                    </div>
                                    <div>
                                        <p class="font-medium text-sm">${v.name}</p>
                                        <p class="text-xs text-gray-400">${v.description}</p>
                                    </div>
                                </div>
                            </div>
                            `).join('')}
                        </div>
                    </div>

                    <!-- Выбор эмоции -->
                    <div class="glass rounded-xl p-6 border border-white/10">
                        <h2 class="text-xl font-semibold mb-4">Выбор эмоции</h2>
                        <div class="grid grid-cols-5 md:grid-cols-9 gap-2">
                            ${emotions.map(e => `
                            <button onclick="state.selectedEmotion='${e.id}';render()"
                                class="emotion-btn p-2 rounded-xl transition-all flex flex-col items-center ${state.selectedEmotion === e.id ? 'bg-purple-500/30 border-2 border-purple-400' : 'bg-white/5 border border-white/10 hover:border-purple-400/50'}">
                                <span class="text-2xl mb-1">${e.emoji}</span>
                                <span class="text-xs text-center leading-tight">${e.name}</span>
                            </button>
                            `).join('')}
                        </div>
                    </div>

                    <!-- Текст и генерация -->
                    <div class="glass rounded-xl p-6 border border-white/10">
                        <h2 class="text-xl font-semibold mb-4">Текст для озвучки</h2>
                        <textarea id="textInput"
                            class="w-full h-40 bg-white/5 border border-white/10 rounded-xl p-4 text-white placeholder-gray-500 resize-none focus:border-blue-400 focus:outline-none"
                            placeholder="Введите текст для озвучивания...">${state.text}</textarea>

                        <div class="mt-4">
                            <label class="text-sm text-gray-400">Скорость речи: ${state.speed > 0 ? '+' : ''}${state.speed}%</label>
                            <input type="range" min="-50" max="50" step="10" value="${state.speed}"
                                class="w-full mt-2 accent-blue-500"
                                onchange="state.speed=parseInt(this.value);render()">
                        </div>

                        <button onclick="generateTTS()"
                            ${state.isGenerating ? 'disabled' : ''}
                            class="w-full mt-4 py-4 rounded-xl bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 disabled:opacity-50 disabled:cursor-not-allowed font-semibold text-lg transition-all">
                            ${state.isGenerating ? '⏳ Генерация...' : '✨ Сгенерировать MP3'}
                        </button>
                    </div>
                </div>

                <!-- Правая колонка: История -->
                <div class="lg:col-span-1">
                    <div class="glass rounded-xl p-6 border border-white/10 sticky top-4">
                        <h2 class="text-xl font-semibold mb-4">История (${state.history.length})</h2>
                        <div class="space-y-4 max-h-[70vh] overflow-y-auto pr-2 history-scroll">
                            ${state.history.length === 0 ? `
                            <div class="text-center py-12 text-gray-500">
                                <p class="text-4xl mb-3">📜</p>
                                <p>История пуста</p>
                            </div>
                            ` : state.history.map(item => `
                            <div class="player-card rounded-xl p-4 ${state.playingId === item.id && state.isPlaying ? 'playing' : ''}">
                                <!-- Header -->
                                <div class="flex items-center justify-between mb-3">
                                    <div class="flex items-center gap-2">
                                        <span class="text-sm font-medium text-gray-300">${item.voice}</span>
                                        <span class="text-xs text-gray-500">•</span>
                                        <span class="text-xs text-gray-400">${item.emotion}</span>
                                    </div>
                                    <button onclick='downloadAudio(${JSON.stringify(item)})' 
                                        class="text-gray-400 hover:text-green-400 transition-colors" title="Скачать">
                                        ⬇
                                    </button>
                                </div>
                                
                                <!-- Text preview -->
                                <p class="text-sm text-gray-300 mb-3 line-clamp-2">${item.text || 'Без названия'}</p>
                                
                                <!-- Waveform / Play button -->
                                <div class="flex items-center gap-3">
                                    <button onclick='playAudio(${JSON.stringify(item)})'
                                        class="w-12 h-12 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 flex items-center justify-center transition-all shadow-lg hover:shadow-purple-500/25">
                                        ${state.playingId === item.id && state.isPlaying ? 
                                            '<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>' : 
                                            '<svg class="w-5 h-5 ml-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>'
                                        }
                                    </button>
                                    
                                    <div class="flex-1">
                                        <!-- Progress bar -->
                                        <div class="progress-bar mb-1" onclick='seekAudio(${JSON.stringify(item)}, event)'>
                                            <div id="progress-fill-${item.id}" class="progress-fill" style="width: ${state.playingId === item.id ? state.progress : 0}%"></div>
                                        </div>
                                        <!-- Time -->
                                        <div class="flex justify-between text-xs text-gray-400">
                                            <span id="time-${item.id}">${state.playingId === item.id ? formatTime(state.currentAudio?.currentTime || 0) : '0:00'} / ${formatDuration(item.duration)}</span>
                                        </div>
                                    </div>
                                </div>
                                
                                <!-- Animated waveform indicator -->
                                ${state.playingId === item.id && state.isPlaying ? `
                                <div class="flex justify-center mt-3">
                                    <div class="waveform">
                                        <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
                                    </div>
                                </div>
                                ` : ''}
                            </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            </div>

            <footer class="text-center mt-8 text-gray-500 text-sm">
                <p>Создано с ❤️ • Edge TTS • Стандарт АИ-22</p>
            </footer>
        </div>
        `;

        const textInput = document.getElementById('textInput');
        if (textInput) {
            textInput.value = state.text;
            textInput.addEventListener('input', (e) => {
                state.text = e.target.value;
            });
        }
    }

    render();
    </script>
</body>
</html>
