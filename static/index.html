    <style>
        * { font-family: 'Inter', system-ui, sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            min-height: 100vh;
        }
        
        .glass { 
            background: rgba(255,255,255,0.05); 
            backdrop-filter: blur(10px); 
        }
        
        .metro-gradient {
            background: linear-gradient(135deg, #0055A4, #0066CC);
        }
        
        .gradient-text {
            background: linear-gradient(to right, #4DA6FF, #8B5CF6, #EC4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .card-gradient {
            background: linear-gradient(135deg, rgba(0,85,164,0.1), rgba(139,92,246,0.1));
        }
        
        /* Waveform - красивый как в Studio 3 */
        .waveform-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            height: 96px;
            padding: 24px;
        }
        
        .waveform-bar {
            width: 4px;
            background: linear-gradient(to top, #0055A4, #8B5CF6, #EC4899);
            border-radius: 4px;
            animation: wave 1s ease-in-out infinite;
            transform-origin: bottom;
        }
        
        .waveform-bar:nth-child(1) { animation-delay: 0s; }
        .waveform-bar:nth-child(2) { animation-delay: 0.05s; }
        .waveform-bar:nth-child(3) { animation-delay: 0.1s; }
        .waveform-bar:nth-child(4) { animation-delay: 0.15s; }
        .waveform-bar:nth-child(5) { animation-delay: 0.2s; }
        .waveform-bar:nth-child(6) { animation-delay: 0.25s; }
        .waveform-bar:nth-child(7) { animation-delay: 0.3s; }
        .waveform-bar:nth-child(8) { animation-delay: 0.35s; }
        .waveform-bar:nth-child(9) { animation-delay: 0.4s; }
        .waveform-bar:nth-child(10) { animation-delay: 0.45s; }
        
        @keyframes wave {
            0%, 100% { height: 20px; }
            50% { height: 80px; }
        }
        
        .waveform-bar.idle {
            animation: none;
            height: 30px;
            opacity: 0.5;
        }
        
        /* Voice card - как в Studio 3 */
        .voice-card {
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }
        
        .voice-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(0,85,164,0.2);
        }
        
        .voice-card.selected {
            border-color: #0055A4 !important;
            background: rgba(0,85,164,0.15) !important;
            box-shadow: 0 0 20px rgba(0,85,164,0.3);
        }
        
        /* Emotion button - с анимацией */
        .emotion-btn {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .emotion-btn:hover {
            transform: scale(1.1) rotate(5deg);
        }
        
        .emotion-btn.selected {
            background: linear-gradient(135deg, rgba(139,92,246,0.3), rgba(0,85,164,0.3)) !important;
            border-color: #8B5CF6 !important;
            box-shadow: 0 0 20px rgba(139,92,246,0.3);
            transform: scale(1.05);
        }
        
/* Player card - Premium */
.player-card {
  background: linear-gradient(135deg, rgba(0,85,164,0.15), rgba(139,92,246,0.1));
  border: 1px solid rgba(0,85,164,0.25);
  border-radius: 20px;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
}

.player-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
}

.player-card:hover {
  border-color: rgba(0,85,164,0.5);
  transform: translateY(-3px);
  box-shadow: 0 20px 40px rgba(0,85,164,0.2);
}

.player-card.playing {
  border-color: rgba(0,85,164,0.7);
  box-shadow: 0 0 40px rgba(0,85,164,0.4), 0 0 80px rgba(139,92,246,0.2);
  background: linear-gradient(135deg, rgba(0,85,164,0.25), rgba(139,92,246,0.2));
}

.player-card.playing::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
  animation: shimmer 2s infinite;
}

@keyframes shimmer {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

/* Play button - Premium */
.play-btn {
  width: 52px;
  height: 52px;
  border-radius: 16px;
  background: linear-gradient(135deg, #0055A4, #0066CC);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(0,85,164,0.4);
  position: relative;
  overflow: hidden;
}

.play-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
  opacity: 0;
  transition: opacity 0.3s;
}

.play-btn:hover {
  transform: scale(1.08);
  box-shadow: 0 8px 25px rgba(0,85,164,0.5);
}

.play-btn:hover::before {
  opacity: 1;
}

.play-btn:active {
  transform: scale(0.95);
}

.play-btn.playing {
  background: linear-gradient(135deg, #8B5CF6, #EC4899);
  box-shadow: 0 4px 20px rgba(139,92,246,0.5);
  animation: pulse-btn 1.5s ease-in-out infinite;
}

@keyframes pulse-btn {
  0%, 100% { box-shadow: 0 4px 20px rgba(139,92,246,0.5); }
  50% { box-shadow: 0 4px 35px rgba(139,92,246,0.7); }
}

/* Progress bar - Premium */
.progress-bar {
  background: rgba(255,255,255,0.08);
  border-radius: 10px;
  height: 8px;
  overflow: hidden;
  cursor: pointer;
  position: relative;
}

.progress-bar:hover {
  height: 10px;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #0055A4, #4DA6FF, #8B5CF6);
  border-radius: 10px;
  transition: width 0.1s linear;
  position: relative;
}

.progress-fill::after {
  content: '';
  position: absolute;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 14px;
  height: 14px;
  background: white;
  border-radius: 50%;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  opacity: 0;
  transition: opacity 0.3s;
}

.progress-bar:hover .progress-fill::after {
  opacity: 1;
}

/* Voice badge */
.voice-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  background: linear-gradient(135deg, rgba(0,85,164,0.2), rgba(139,92,246,0.2));
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  color: #4DA6FF;
}

/* Download button */
.download-btn {
  width: 36px;
  height: 36px;
  border-radius: 12px;
  background: rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  border: 1px solid rgba(255,255,255,0.1);
}

.download-btn:hover {
  background: linear-gradient(135deg, #0055A4, #0066CC);
  transform: translateY(-2px);
  box-shadow: 0 4px 15px rgba(0,85,164,0.4);
}
        
        /* Scroll */
        .history-scroll::-webkit-scrollbar { width: 4px; }
        .history-scroll::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 2px; }
        .history-scroll::-webkit-scrollbar-thumb { background: rgba(0,85,164,0.5); border-radius: 2px; }
        
        /* Login */
        .login-container {
            background: linear-gradient(135deg, rgba(0,85,164,0.2), rgba(0,102,204,0.1));
            border: 1px solid rgba(0,85,164,0.4);
        }
        
        /* Metro logo */
        .metro-logo {
            width: 80px;
            height: 80px;
            background: #0055A4;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 0 40px rgba(0,85,164,0.4);
            overflow: hidden;
        }
        
        .metro-logo svg { width: 60px; height: 60px; }
        
        .metro-logo-small {
            width: 48px;
            height: 48px;
            min-width: 48px;
            background: #0055A4;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,85,164,0.3);
            overflow: hidden;
        }
        
        .metro-logo-small svg { width: 32px; height: 32px; }
        
        /* Install banner */
        .install-banner {
            background: linear-gradient(135deg, rgba(0,85,164,0.95), rgba(0,102,204,0.95));
            backdrop-filter: blur(10px);
        }
        
        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        .fade-in-delay-1 { animation: fadeIn 0.6s ease-out 0.1s forwards; opacity: 0; }
        .fade-in-delay-2 { animation: fadeIn 0.6s ease-out 0.2s forwards; opacity: 0; }
        .fade-in-delay-3 { animation: fadeIn 0.6s ease-out 0.3s forwards; opacity: 0; }
        .fade-in-delay-4 { animation: fadeIn 0.6s ease-out 0.4s forwards; opacity: 0; }
        
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(0,85,164,0.3); }
            50% { box-shadow: 0 0 40px rgba(0,85,164,0.5); }
        }
        
        .pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
        
        /* Generate button */
        .generate-btn {
            background: linear-gradient(135deg, #0055A4, #0066CC);
            transition: all 0.3s ease;
        }
        
        .generate-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,85,164,0.4);
        }
        
        .generate-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="min-h-screen text-white p-4 md:p-8">
    <div id="app"></div>

    <script>
    const API_URL = window.location.origin;
    const APP_PASSWORD = 'dragonsvitex2026';
    const SESSION_KEY = 'metro_tts_session';
    
    let deferredPrompt = null;
    let installBannerDismissed = sessionStorage.getItem('install_banner_dismissed');

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
    });

    function showInstallBanner() {
        const banner = document.getElementById('installBanner');
        if (banner && deferredPrompt) banner.classList.remove('hidden');
    }

    function hideInstallBanner() {
        const banner = document.getElementById('installBanner');
        if (banner) banner.classList.add('hidden');
        sessionStorage.setItem('install_banner_dismissed', 'true');
    }

    async function installApp() {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') hideInstallBanner();
        deferredPrompt = null;
    }

    const voices = [
        { id: 'dmitry', name: 'Дмитрий', description: 'Информационный', gender: 'male', emotions: 3 },
        { id: 'dmitry_advanced', name: 'Дмитрий Pro', description: 'С эмоциями', gender: 'male', emotions: 7 },
        { id: 'oleg', name: 'Олег', description: 'Официальный', gender: 'male', emotions: 3 },
        { id: 'filipp', name: 'Филипп', description: 'Дикторский', gender: 'male', emotions: 1 },
        { id: 'svetlana', name: 'Светлана', description: 'Информационный', gender: 'female', emotions: 3 },
        { id: 'svetlana_advanced', name: 'Светлана Pro', description: 'С эмоциями', gender: 'female', emotions: 7 },
        { id: 'alena', name: 'Алёна', description: 'Спокойный', gender: 'female', emotions: 3 },
    ];

    const emotions = [
        { id: 'neutral', emoji: '😐', name: 'Нейтральный', desc: 'Спокойное произношение' },
        { id: 'cheerful', emoji: '😊', name: 'Весёлый', desc: 'Позитивная интонация' },
        { id: 'sad', emoji: '😢', name: 'Грустный', desc: 'Печальная интонация' },
        { id: 'angry', emoji: '😠', name: 'Злой', desc: 'Агрессивная интонация' },
        { id: 'scared', emoji: '😨', name: 'Испуг', desc: 'Тревожная интонация' },
        { id: 'serious', emoji: '🧐', name: 'Серьёзный', desc: 'Деловая интонация' },
        { id: 'gentle', emoji: '🥰', name: 'Нежный', desc: 'Тёплая интонация' },
        { id: 'calm', emoji: '😌', name: 'Спокойный', desc: 'Размеренное произношение' },
        { id: 'professional', emoji: '💼', name: 'Деловой', desc: 'Дикторский стиль' },
    ];

    let state = {
        isAuthenticated: false,
        loginError: '',
        selectedVoice: 'dmitry_advanced',
        selectedEmotion: 'neutral',
        text: '',
        speed: 0,
        isGenerating: false,
        history: [],
        currentAudio: null,
        isPlaying: false,
        playingId: null,
        progress: 0,
        genderFilter: 'all',
        stats: { totalChars: 0, totalGenerations: 0 }
    };

    let progressInterval = null;

    function checkSession() {
        if (sessionStorage.getItem(SESSION_KEY) === 'authenticated') {
            state.isAuthenticated = true;
        }
    }

    function handleLogin() {
        const input = document.getElementById('passwordInput');
        if (input?.value === APP_PASSWORD) {
            state.isAuthenticated = true;
            state.loginError = '';
            sessionStorage.setItem(SESSION_KEY, 'authenticated');
            if (deferredPrompt && !installBannerDismissed) setTimeout(showInstallBanner, 2000);
            render();
        } else {
            state.loginError = 'Неверный пароль';
            render();
        }
    }

    function handleLogout() {
        state.isAuthenticated = false;
        sessionStorage.removeItem(SESSION_KEY);
        render();
    }

  async function generateTTS() {
    const textEl = document.getElementById('textInput');
    const text = textEl ? textEl.value.trim() : state.text.trim();
    if (!text) { alert('Введите текст'); return; }

        state.isGenerating = true;
    state.stats.totalChars += text.length;
    state.stats.totalGenerations++;
    updateStatsDisplay();
        updateGeneratingState();

        try {
            const res = await fetch(`${API_URL}/generate`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json; charset=utf-8' },
                body: JSON.stringify({ text, voice: state.selectedVoice, emotion: state.selectedEmotion, speed: state.speed })
            });

            if (!res.ok) throw new Error((await res.json()).detail || 'Ошибка');

    const newItem = await res.json();
    state.history.unshift(newItem);
    addToHistoryDOM(newItem);
        } catch (e) {
            alert('Ошибка: ' + e.message);
        } finally {
            state.isGenerating = false;
            updateGeneratingState();
        }
    }

  function updateGeneratingState() {
    const waveformBars = document.querySelectorAll('.waveform-bar');
    waveformBars.forEach(bar => {
      if (state.isPlaying || state.isGenerating) {
        bar.classList.remove('idle');
      } else {
        bar.classList.add('idle');
      }
    });

    const btn = document.querySelector('.generate-btn');
    if (btn) {
      btn.textContent = state.isGenerating ? '⏳ Генерация...' : '✨ Сгенерировать объявление';
      btn.disabled = state.isGenerating;
    }
  }

function addToHistoryDOM(item) {
  const container = document.getElementById('historyList');
  if (!container) {
    console.error('History container not found');
    return;
  }

  const emptyMsg = container.querySelector('.text-center');
  if (emptyMsg) emptyMsg.remove();

  const card = document.createElement('div');
  card.className = 'player-card p-5';
  card.dataset.id = item.id;
  const itemJson = JSON.stringify(item).replace(/'/g, "\\'");
  card.innerHTML = `
<div class="flex items-start justify-between mb-3">
<div class="flex-1 min-w-0">
<div class="voice-badge mb-2">
<svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
${item.voice}
</div>
<p class="text-sm text-gray-200 line-clamp-2 leading-relaxed">${item.text || 'Без названия'}</p>
</div>
<button onclick='downloadAudio(${itemJson})' class="download-btn flex-shrink-0">
<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
</button>
</div>
<div class="flex items-center gap-4">
<button onclick='playAudio(${itemJson})' class="play-btn">
<svg class="w-6 h-6 ml-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
</button>
<div class="flex-1">
<div class="progress-bar" onclick='seekAudio(${itemJson},event)'>
<div id="progress-fill-${item.id}" class="progress-fill" style="width:0%"></div>
</div>
<div class="flex justify-between mt-2">
<span class="text-xs text-gray-500 font-mono" id="time-${item.id}">0:00</span>
<span class="text-xs text-gray-500 font-mono">${formatTime(item.duration)}</span>
</div>
</div>
</div>`;
  container.insertBefore(card, container.firstChild);

  const countEl = document.getElementById('historyCount');
  if (countEl) {
    countEl.textContent = parseInt(countEl.textContent || '0') + 1;
  }
}

    function playAudio(item) {
        if (state.currentAudio && state.playingId === item.id) {
            if (state.isPlaying) {
                state.currentAudio.pause();
                state.isPlaying = false;
                clearInterval(progressInterval);
            } else {
                state.currentAudio.play();
                state.isPlaying = true;
                startProgressTracking();
            }
            updatePlayingState();
            return;
        }

        if (state.currentAudio) { state.currentAudio.pause(); clearInterval(progressInterval); }

        const audio = new Audio(`${API_URL}${encodeURI(item.audio_url)}`);
        audio.onloadedmetadata = () => {
            state.currentAudio = audio;
            state.isPlaying = true;
            state.playingId = item.id;
            state.progress = 0;
            updatePlayingState();
            startProgressTracking();
        };
        audio.onended = () => { 
            state.isPlaying = false; 
            state.playingId = null; 
            state.progress = 0; 
            clearInterval(progressInterval); 
            updatePlayingState();
        };
        audio.onerror = () => { 
            alert('Ошибка воспроизведения'); 
            state.isPlaying = false; 
            state.playingId = null; 
            updatePlayingState();
        };
        audio.play();
    }

    function updatePlayingState() {
        // Обновляем только waveform без перерисовки всего UI
        const waveformBars = document.querySelectorAll('.waveform-bar');
        waveformBars.forEach(bar => {
            if (state.isPlaying || state.isGenerating) {
                bar.classList.remove('idle');
            } else {
                bar.classList.add('idle');
            }
        });
        
        // Обновляем кнопки play/pause в истории
        const historyItems = document.querySelectorAll('.player-card');
        historyItems.forEach(card => {
            if (card.dataset.id === state.playingId && state.isPlaying) {
                card.classList.add('playing');
            } else {
                card.classList.remove('playing');
            }
        });
    }

    function startProgressTracking() {
        clearInterval(progressInterval);
        progressInterval = setInterval(() => {
            if (state.currentAudio && state.isPlaying) {
                const progress = (state.currentAudio.currentTime / state.currentAudio.duration) * 100;
                state.progress = progress || 0;
                const el = document.getElementById('progress-fill-' + state.playingId);
                if (el) el.style.width = progress + '%';
                const timeEl = document.getElementById('time-' + state.playingId);
                if (timeEl) timeEl.textContent = `${formatTime(state.currentAudio.currentTime)} / ${formatTime(state.currentAudio.duration)}`;
            }
        }, 100);
    }

    function seekAudio(item, e) {
        if (!state.currentAudio || state.playingId !== item.id) return;
        const rect = e.currentTarget.getBoundingClientRect();
        const percent = (e.clientX - rect.left) / rect.width;
        state.currentAudio.currentTime = percent * state.currentAudio.duration;
        state.progress = percent * 100;
        const el = document.getElementById('progress-fill-' + state.playingId);
        if (el) el.style.width = (percent * 100) + '%';
    }

    function downloadAudio(item) {
        const link = document.createElement('a');
        link.href = `${API_URL}${encodeURI(item.audio_url)}`;
        const d = new Date();
        link.download = `${item.voice.replace(/ /g,'_')}_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}_${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}.mp3`;
        link.click();
    }

    function formatTime(s) { if (!s || isNaN(s)) return '0:00'; return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`; }

  function updateStatsDisplay() {
    const charsEl = document.querySelector('.text-right .text-gray-400:first-child');
    const gensEl = document.querySelector('.text-right .text-gray-400:last-child');
    if (charsEl) charsEl.textContent = `📊 ${state.stats.totalChars} символов`;
    if (gensEl) gensEl.textContent = `🎵 ${state.stats.totalGenerations} генераций`;
  }

    function renderLogin() {
        return `
        <div class="min-h-screen flex items-center justify-center fade-in">
            <div class="login-container rounded-2xl p-8 w-full max-w-md">
                <div class="metro-logo">
                    <img src="/static/metro-logo.png" alt="М" style="width:60px;height:60px;object-fit:contain;">
                </div>
                <h1 class="text-2xl font-bold text-center mb-2 gradient-text">СПС Голосовая Студия</h1>
                <p class="text-center text-gray-400 mb-6 text-sm">Служба пассажирских сервисов<br>ГУП «Петербургский метрополитен»</p>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Пароль</label>
                        <input type="password" id="passwordInput" class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-gray-500 focus:border-[#0055A4] focus:outline-none" placeholder="Введите пароль" onkeypress="if(event.key==='Enter')handleLogin()">
                    </div>
                    ${state.loginError ? `<p class="text-red-400 text-sm text-center">${state.loginError}</p>` : ''}
                    <button onclick="handleLogin()" class="w-full py-3 rounded-xl metro-gradient hover:opacity-90 font-semibold transition-all hover:shadow-lg hover:shadow-blue-500/25">Войти</button>
                </div>
                <p class="text-center text-gray-500 text-xs mt-6">Объединяем город, сближаем людей</p>
            </div>
        </div>`;
    }

    function renderMain() {
        const filteredVoices = voices.filter(v => state.genderFilter === 'all' || v.gender === state.genderFilter);
        const isWaveformActive = state.isGenerating || state.isPlaying;

        return `
        <!-- Install Banner -->
        <div id="installBanner" class="install-banner hidden fixed top-0 left-0 right-0 z-50 p-4 flex items-center justify-between gap-4">
            <div class="flex items-center gap-3">
<div class="metro-logo-small" style="width:40px;height:40px;min-width:40px;">
                        <img src="/static/metro-logo.png" alt="М" style="width:28px;height:28px;object-fit:contain;">
                    </div>
                <div>
                    <p class="font-semibold text-sm">Установить приложение</p>
                    <p class="text-xs text-white/70">Добавьте СПС TTS на главный экран для быстрого доступа</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="installApp()" class="px-4 py-2 bg-white text-[#0055A4] rounded-lg font-semibold text-sm hover:bg-gray-100 transition-colors">Установить</button>
                <button onclick="hideInstallBanner()" class="px-3 py-2 text-white/70 hover:text-white transition-colors">✕</button>
            </div>
        </div>

        <div class="max-w-7xl mx-auto">
            <!-- Header -->
            <header class="mb-8 fade-in">
                <div class="flex items-center justify-between mb-6">
                    <div class="flex items-center gap-4">
                        <div class="metro-logo-small pulse-glow">
                            <img src="/static/metro-logo.png" alt="М" style="width:32px;height:32px;object-fit:contain;">
                        </div>
                        <div>
                            <h1 class="text-2xl font-bold gradient-text">СПС Голосовая Студия</h1>
                            <p class="text-gray-400 text-sm">Петербургский метрополитен • Стандарт АИ-22</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="text-right text-sm">
                            <p class="text-gray-400">📊 ${state.stats.totalChars} символов</p>
                            <p class="text-gray-400">🎵 ${state.stats.totalGenerations} генераций</p>
                        </div>
                        <button onclick="handleLogout()" class="text-gray-400 hover:text-red-400 transition-colors">🚪 Выйти</button>
                    </div>
                </div>
                
                <!-- Stats Cards -->
                <div class="grid grid-cols-3 gap-4">
                    <div class="card-gradient rounded-xl p-4 border border-blue-500/20 hover:scale-[1.02] transition-transform cursor-default">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-lg bg-blue-500/20 flex items-center justify-center">🎤</div>
                            <div><p class="text-2xl font-bold text-white">7</p><p class="text-xs text-gray-400">Голосов</p></div>
                        </div>
                    </div>
                    <div class="card-gradient rounded-xl p-4 border border-purple-500/20 hover:scale-[1.02] transition-transform cursor-default">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-lg bg-purple-500/20 flex items-center justify-center">✨</div>
                            <div><p class="text-2xl font-bold text-white">9</p><p class="text-xs text-gray-400">Эмоций</p></div>
                        </div>
                    </div>
                    <div class="card-gradient rounded-xl p-4 border border-pink-500/20 hover:scale-[1.02] transition-transform cursor-default">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-lg bg-pink-500/20 flex items-center justify-center">📻</div>
                            <div><p class="text-2xl font-bold text-white">MP3</p><p class="text-xs text-gray-400">Стандарт АИ-22</p></div>
                        </div>
                    </div>
                </div>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 space-y-6">
                    <!-- Voice Selection -->
                    <div class="fade-in fade-in-delay-1">
                        <div class="flex items-center justify-between mb-4">
                            <h2 class="text-xl font-semibold">🎤 Выбор голоса</h2>
                            <div class="flex gap-2">
                                <button onclick="state.genderFilter='all';render()" class="px-3 py-1 rounded-lg text-sm transition-all ${state.genderFilter === 'all' ? 'metro-gradient' : 'bg-white/10 hover:bg-white/20'}">Все</button>
                                <button onclick="state.genderFilter='male';render()" class="px-3 py-1 rounded-lg text-sm transition-all ${state.genderFilter === 'male' ? 'metro-gradient' : 'bg-white/10 hover:bg-white/20'}">👨 Мужские</button>
                                <button onclick="state.genderFilter='female';render()" class="px-3 py-1 rounded-lg text-sm transition-all ${state.genderFilter === 'female' ? 'bg-pink-500' : 'bg-white/10 hover:bg-white/20'}">👩 Женские</button>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                            ${filteredVoices.map(v => `
                            <div onclick="state.selectedVoice='${v.id}';render()" class="voice-card p-4 rounded-xl ${state.selectedVoice === v.id ? 'selected' : 'glass border border-white/10'}">
                                <div class="flex items-start gap-3">
                                    <div class="w-12 h-12 rounded-full ${v.gender === 'male' ? 'bg-gradient-to-br from-blue-500 to-purple-600' : 'bg-gradient-to-br from-pink-500 to-rose-600'} flex items-center justify-center flex-shrink-0">🎤</div>
                                    <div class="flex-1 min-w-0">
                                        <h3 class="font-semibold text-white truncate">${v.name}</h3>
                                        <p class="text-sm text-gray-400 mb-2 truncate">${v.description}</p>
                                        <div class="flex flex-wrap gap-1">
                                            <span class="px-2 py-0.5 rounded-full text-xs ${v.gender === 'male' ? 'bg-blue-500/20 text-blue-300' : 'bg-pink-500/20 text-pink-300'}">${v.gender === 'male' ? '👨 Мужской' : '👩 Женский'}</span>
                                            <span class="px-2 py-0.5 rounded-full text-xs bg-purple-500/20 text-purple-300">${v.emotions} эмоций</span>
                                        </div>
                                    </div>
                                </div>
                                ${state.selectedVoice === v.id ? '<div class="absolute top-3 right-3">✨</div>' : ''}
                            </div>`).join('')}
                        </div>
                    </div>

                    <!-- Emotion Selection -->
                    <div class="fade-in fade-in-delay-2">
                        <h2 class="text-xl font-semibold mb-4">✨ Выбор интонации</h2>
                        <div class="grid grid-cols-5 md:grid-cols-9 gap-3">
                            ${emotions.map(e => `
                            <button onclick="state.selectedEmotion='${e.id}';render()" class="emotion-btn p-3 rounded-xl flex flex-col items-center ${state.selectedEmotion === e.id ? 'selected' : 'glass border border-white/10'}" title="${e.desc}">
                                <span class="text-3xl mb-1">${e.emoji}</span>
                                <span class="text-xs text-center text-gray-300">${e.name}</span>
                            </button>`).join('')}
                        </div>
                    </div>

                    <!-- Text Input -->
                    <div class="fade-in fade-in-delay-3">
                        <div class="glass rounded-xl p-6 border border-white/10">
                            <h2 class="text-xl font-semibold mb-4">⚡ Текст объявления</h2>
                            <textarea id="textInput" class="w-full h-32 bg-white/5 border border-white/10 rounded-xl p-4 text-white placeholder-gray-500 resize-none focus:border-[#0055A4] focus:outline-none" placeholder="Введите текст для озвучивания...">${state.text}</textarea>
                            <div class="mt-4">
                                <label class="text-sm text-gray-400">🔊 Скорость речи: ${state.speed > 0 ? '+' : ''}${state.speed}%</label>
                                <input type="range" min="-50" max="50" step="10" value="${state.speed}" class="w-full mt-2 accent-[#0055A4]" onchange="state.speed=parseInt(this.value);render()">
                            </div>
                            <button onclick="generateTTS()" ${state.isGenerating ? 'disabled' : ''} class="generate-btn w-full mt-4 py-4 rounded-xl font-semibold text-lg text-white">
                                ${state.isGenerating ? '⏳ Генерация...' : '✨ Сгенерировать объявление'}
                            </button>
                        </div>
                    </div>

                    <!-- Waveform -->
                    <div class="fade-in fade-in-delay-4">
                        <div class="card-gradient rounded-xl border border-white/10 overflow-hidden">
                            <div class="waveform-container">
                                ${Array(10).fill(0).map((_, i) => `<div class="waveform-bar ${isWaveformActive ? '' : 'idle'}"></div>`).join('')}
                            </div>
                        </div>
                    </div>
                </div>

<!-- History -->
<div class="lg:col-span-1">
<div class="glass rounded-xl p-6 border border-white/10 sticky top-4">
<h2 class="text-xl font-semibold mb-4">📻 История (<span id="historyCount">${state.history.length}</span>)</h2>
<div class="max-h-[70vh] overflow-y-auto pr-2 history-scroll">
<div class="space-y-4" id="historyList">
${state.history.length === 0 ? `<div class="text-center py-12 text-gray-500"><p class="text-4xl mb-3">📜</p><p>История пуста</p></div>` :
state.history.map(item => `
<div class="player-card p-5 ${state.playingId === item.id && state.isPlaying ? 'playing' : ''}">
<div class="flex items-start justify-between mb-3">
<div class="flex-1 min-w-0">
<div class="voice-badge mb-2">
<svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
${item.voice}
</div>
<p class="text-sm text-gray-200 line-clamp-2 leading-relaxed">${item.text || 'Без названия'}</p>
</div>
<button onclick='downloadAudio(${JSON.stringify(item)})' class="download-btn flex-shrink-0">
<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
</button>
</div>
<div class="flex items-center gap-4">
<button onclick='playAudio(${JSON.stringify(item)})' class="play-btn ${state.playingId === item.id && state.isPlaying ? 'playing' : ''}">
${state.playingId === item.id && state.isPlaying ?
'<svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>' :
'<svg class="w-6 h-6 ml-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>'}
</button>
<div class="flex-1">
<div class="progress-bar" onclick='seekAudio(${JSON.stringify(item)},event)'>
<div id="progress-fill-${item.id}" class="progress-fill" style="width:${state.playingId===item.id?state.progress:0}%"></div>
</div>
<div class="flex justify-between mt-2">
<span class="text-xs text-gray-500 font-mono" id="time-${item.id}">${state.playingId === item.id ? formatTime(state.currentAudio?.currentTime || 0) : '0:00'}</span>
<span class="text-xs text-gray-500 font-mono">${formatTime(item.duration)}</span>
</div>
</div>
</div>
</div>`).join('\')}
</div>
</div>
</div>
</div>

<footer class="text-center mt-12 text-gray-500 text-sm fade-in fade-in-delay-4">
                <p>ГУП «Петербургский метрополитен» • Служба пассажирских сервисов</p>
                <p class="text-xs mt-1">Объединяем город, сближаем людей</p>
            </footer>
        </div>`;
    }

    function render() {
        const app = document.getElementById('app');
        app.innerHTML = state.isAuthenticated ? renderMain() : renderLogin();
        if (state.isAuthenticated) {
            const input = document.getElementById('textInput');
            if (input) { input.value = state.text; input.addEventListener('input', e => state.text = e.target.value); }
        }
    }

    checkSession();
    render();
    </script>
</body>
</html>
